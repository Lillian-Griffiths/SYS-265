---
# =============================================================================
# COMBINED LAB PLAYBOOK
# =============================================================================
# SOURCE ELEMENTS:
#   [1] Disk Inventory          — originally from Group 01, Play 1
#   [2] Password Policy         — originally from Group 01, Play 5
#   [3] Guest Account Disabled  — originally from Group 01, Play 4
#   [4] Firewalld Baseline      — originally from Group 02, Play 3
#   [5] Control Panel Restrict  — originally from Group 05, Play 5
#   [6] DNS Record Verification — originally from Group 04, Play 2
#
# HOST TARGETS:
#   rocky   → Ansible01, Ansible02  (elements 1, 4)
#   windows → AD01, MGMT01, WKS01   (elements 2, 3, 5, 6)
#   AD01 only for element 2         (password policy requires DC)
#
# HOW TO DRY-RUN (no changes applied):
#   ansible-playbook combined_lab.yml -i inventory.ini --check
#
# HOW TO APPLY:
#   ansible-playbook combined_lab.yml -i inventory.ini
# =============================================================================


# =============================================================================
# ELEMENT 1 — DISK INVENTORY (Rocky Linux)
# Source: Group 01, Play 1
# Purpose: Report disk usage across all mounted filesystems and warn on high use
# =============================================================================
- name: "Combined | [1] Disk Inventory | Rocky Linux"
  hosts: rocky
  become: true
  gather_facts: true    # ansible_mounts is populated by gather_facts

  vars:
    # Warn when any filesystem exceeds this usage percentage
    disk_warn_threshold: 80

  tasks:

    # -------------------------------------------------------------------------
    # TASK 1.1 — Display usage for every mounted filesystem
    # Filters out pseudo-filesystems that report size_total = 0 (e.g. tmpfs)
    # -------------------------------------------------------------------------
    - name: "Rocky | Display disk usage for all mount points"
      ansible.builtin.debug:
        msg: >
          Mount: {{ item.mount }}
          | Device: {{ item.device }}
          | Total: {{ (item.size_total / 1073741824) | round(2) }} GB
          | Used: {{ (((item.size_total - item.size_available) / item.size_total) * 100) | round(1) }}%
      loop: "{{ ansible_mounts }}"
      when: item.size_total > 0

    # -------------------------------------------------------------------------
    # TASK 1.2 — Warn if any filesystem exceeds the threshold
    # Uses a Jinja2 conditional inside the when clause for clean logic
    # -------------------------------------------------------------------------
    - name: "Rocky | Warn if disk usage exceeds {{ disk_warn_threshold }}%"
      ansible.builtin.debug:
        msg: >
          WARNING: {{ item.mount }} on {{ inventory_hostname }}
          is over {{ disk_warn_threshold }}% full!
          Used: {{ (((item.size_total - item.size_available) / item.size_total) * 100) | round(1) }}%
      loop: "{{ ansible_mounts }}"
      when:
        - item.size_total > 0
        - (((item.size_total - item.size_available) / item.size_total) * 100) > disk_warn_threshold

    # -------------------------------------------------------------------------
    # TASK 1.3 — Confirm filesystems that are within healthy limits
    # -------------------------------------------------------------------------
    - name: "Rocky | Confirm healthy filesystems"
      ansible.builtin.debug:
        msg: >
          OK: {{ item.mount }} on {{ inventory_hostname }}
          at {{ (((item.size_total - item.size_available) / item.size_total) * 100) | round(1) }}% used.
      loop: "{{ ansible_mounts }}"
      when:
        - item.size_total > 0
        - (((item.size_total - item.size_available) / item.size_total) * 100) <= disk_warn_threshold


# =============================================================================
# ELEMENT 2 — PASSWORD POLICY (Active Directory — AD01 only)
# Source: Group 01, Play 5
# Purpose: Apply and verify the Default Domain Password Policy via PowerShell
# Note: Only the Domain Controller (AD01) can apply domain-wide password policy
# =============================================================================
- name: "Combined | [2] Password Policy | Active Directory (AD01)"
  hosts: windows
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # TASK 2.1 — Apply the Default Domain Password Policy
    # Set-ADDefaultDomainPasswordPolicy requires the ActiveDirectory module
    # and must run on the DC — when: guard skips all other Windows hosts
    # -------------------------------------------------------------------------
    - name: "AD | Apply Default Domain Password Policy"
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory -ErrorAction Stop
        Set-ADDefaultDomainPasswordPolicy `
          -Identity $env:USERDNSDOMAIN `
          -MinPasswordLength 12 `
          -PasswordHistoryCount 10 `
          -MaxPasswordAge "90.00:00:00" `
          -MinPasswordAge "1.00:00:00" `
          -ComplexityEnabled $true `
          -ReversibleEncryptionEnabled $false
        Write-Output "Password policy applied successfully."
      register: pwd_policy_result
      when: inventory_hostname == "ad01-lillian"   # Only the DC can modify domain policy
      ignore_errors: true

    - name: "AD | Display password policy apply result"
      ansible.builtin.debug:
        msg: "{{ pwd_policy_result.stdout | default('Skipped — not the DC') | trim }}"
      when: inventory_hostname == "ad01-lillian"

    # -------------------------------------------------------------------------
    # TASK 2.2 — Read back and verify the applied policy (AD01 only)
    # This read-only verification confirms the settings took effect
    # -------------------------------------------------------------------------
    - name: "AD | Read back and verify current password policy"
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory -ErrorAction Stop
        $p = Get-ADDefaultDomainPasswordPolicy
        "MinLen=$($p.MinPasswordLength) | " +
        "History=$($p.PasswordHistoryCount) | " +
        "MaxAge=$($p.MaxPasswordAge.Days)d | " +
        "MinAge=$($p.MinPasswordAge.Days)d | " +
        "Complexity=$($p.ComplexityEnabled) | " +
        "Reversible=$($p.ReversibleEncryptionEnabled)"
      register: pwd_readback
      changed_when: false
      when: inventory_hostname == "ad01-lillian"
      ignore_errors: true

    - name: "AD | Display password policy verification"
      ansible.builtin.debug:
        msg: "Current domain password policy: {{ pwd_readback.stdout | trim }}"
      when:
        - inventory_hostname == "ad01-lillian"
        - pwd_readback is not failed
        - pwd_readback is not skipped
        - pwd_readback.stdout is defined


# =============================================================================
# ELEMENT 3 — GUEST ACCOUNT DISABLED (All Windows hosts)
# Source: Group 01, Play 4
# Purpose: Ensure the built-in Guest account is disabled on every Windows host
# =============================================================================
- name: "Combined | [3] Guest Account Disabled | All Windows Hosts"
  hosts: windows
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # TASK 3.1 — Disable the built-in Guest account
    # win_user is idempotent — only acts if the account is currently enabled
    # -------------------------------------------------------------------------
    - name: "Windows | Disable the built-in Guest account"
      ansible.windows.win_user:
        name: Guest
        account_disabled: true

    # -------------------------------------------------------------------------
    # TASK 3.2 — Verify the Guest account is now disabled
    # Read back the Enabled property and display it for confirmation
    # -------------------------------------------------------------------------
    - name: "Windows | Verify Guest account is disabled"
      ansible.windows.win_shell: |
        (Get-LocalUser -Name 'Guest').Enabled
      register: guest_status
      changed_when: false
      ignore_errors: true

    - name: "Windows | Display Guest account status"
      ansible.builtin.debug:
        msg: >
          Guest account Enabled = {{ guest_status.stdout | trim }}
          on {{ inventory_hostname }}
          (False = DISABLED — correct!)
      when:
        - guest_status is not skipped
        - guest_status.stdout is defined

    # -------------------------------------------------------------------------
    # TASK 3.3 — Fail loudly if the Guest account is somehow still enabled
    # This turns a soft check into a hard enforcement gate
    # -------------------------------------------------------------------------
    - name: "Windows | Fail if Guest account is still enabled"
      ansible.builtin.fail:
        msg: >
          ENFORCEMENT FAILURE: Guest account is still ENABLED
          on {{ inventory_hostname }}! Manual investigation required.
      when:
        - guest_status is not skipped
        - guest_status is not failed
        - guest_status.stdout is defined
        - guest_status.stdout | trim | lower == "true"


# =============================================================================
# ELEMENT 4 — FIREWALLD BASELINE (Rocky Linux)
# Source: Group 02, Play 3
# Purpose: Install, enable, and configure firewalld to allow SSH only
# =============================================================================
- name: "Combined | [4] Firewalld Baseline | Rocky Linux"
  hosts: rocky
  become: true
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # TASK 4.1 — Ensure firewalld is installed
    # -------------------------------------------------------------------------
    - name: "Rocky | Install firewalld"
      ansible.builtin.dnf:
        name: firewalld
        state: present

    # -------------------------------------------------------------------------
    # TASK 4.2 — Ensure firewalld is started and enabled at boot
    # -------------------------------------------------------------------------
    - name: "Rocky | Enable and start firewalld"
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true

    # -------------------------------------------------------------------------
    # TASK 4.3 — Allow SSH through the public zone (permanent + immediate)
    # 'immediate: true' applies the rule now without a separate reload
    # -------------------------------------------------------------------------
    - name: "Rocky | Allow SSH through firewalld (public zone)"
      ansible.posix.firewalld:
        service: ssh
        zone: public
        permanent: true
        state: enabled
        immediate: true

    # -------------------------------------------------------------------------
    # TASK 4.4 — Remove the dhcpv6-client rule (not needed in this lab)
    # Reducing default open services shrinks the attack surface
    # ignore_errors: true handles the case where this rule was never present
    # -------------------------------------------------------------------------
    - name: "Rocky | Remove unnecessary dhcpv6-client rule"
      ansible.posix.firewalld:
        service: dhcpv6-client
        zone: public
        permanent: true
        state: disabled
        immediate: true
      ignore_errors: true

    # -------------------------------------------------------------------------
    # TASK 4.5 — Reload firewalld to commit all permanent rule changes
    # -------------------------------------------------------------------------
    - name: "Rocky | Reload firewalld to apply permanent rules"
      ansible.builtin.command:
        cmd: firewall-cmd --reload
      changed_when: true

    # -------------------------------------------------------------------------
    # TASK 4.6 — Display the active firewall configuration for verification
    # -------------------------------------------------------------------------
    - name: "Rocky | Display active firewalld rules"
      ansible.builtin.command:
        cmd: firewall-cmd --list-all
      register: fw_rules
      changed_when: false

    - name: "Rocky | Show firewalld rule output"
      ansible.builtin.debug:
        msg: "{{ fw_rules.stdout_lines }}"


# =============================================================================
# ELEMENT 5 — CONTROL PANEL RESTRICTION (All Windows hosts)
# Source: Group 05, Play 5
# Purpose: Block standard (non-admin) users from accessing Control Panel
# =============================================================================
- name: "Combined | [5] Control Panel Restriction | All Windows Hosts"
  hosts: windows
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # TASK 5.1 — Set the NoControlPanel registry key under machine policy
    # Applied to HKLM so it is enforced machine-wide for all non-admin users
    # GPO equivalent: User Config > Administrative Templates >
    #   Control Panel > Prohibit access to Control Panel and PC Settings
    # -------------------------------------------------------------------------
    - name: "Windows | Restrict Control Panel access via machine policy"
      ansible.windows.win_regedit:
        path: HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
        name: NoControlPanel
        data: 1           # 1 = access prohibited for standard users
        type: dword

    # -------------------------------------------------------------------------
    # TASK 5.2 — Read back the registry value to confirm it was applied
    # -------------------------------------------------------------------------
    - name: "Windows | Verify NoControlPanel registry key"
      ansible.windows.win_shell: |
        $path = 'HKLM:\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer'
        $val  = (Get-ItemProperty -Path $path -ErrorAction SilentlyContinue).NoControlPanel
        "NoControlPanel = $val on $env:COMPUTERNAME (1 = restricted — correct!)"
      register: cp_verify
      changed_when: false

    - name: "Windows | Display Control Panel restriction verification"
      ansible.builtin.debug:
        msg: "{{ cp_verify.stdout | trim }}"
      when:
        - cp_verify is not skipped
        - cp_verify is not failed
        - cp_verify.stdout is defined

    # -------------------------------------------------------------------------
    # TASK 5.3 — Warn if the key was not set as expected (defensive check)
    # -------------------------------------------------------------------------
    - name: "Windows | Warn if Control Panel restriction was not applied"
      ansible.builtin.debug:
        msg: >
          WARNING: NoControlPanel key on {{ inventory_hostname }}
          did not return the expected value of 1. Please investigate.
      when: 
        - cp_verify is not skipped
        - cp_verify is not failed
        - cp_verify.stdout is defined
        - "'NoControlPanel = 1' not in cp_verify.stdout"


# =============================================================================
# ELEMENT 6 — DNS RECORD VERIFICATION (All Windows hosts)
# Source: Group 04, Play 2
# Purpose: Verify forward DNS resolution and PTR (reverse) records resolve
# =============================================================================
- name: "Combined | [6] DNS Record Verification | All Windows Hosts"
  hosts: windows
  gather_facts: false

  tasks:

    # -------------------------------------------------------------------------
    # TASK 6.1 — Test forward DNS resolution for the domain itself
    # Resolve-DnsName is the PowerShell equivalent of nslookup/dig
    # -------------------------------------------------------------------------
    - name: "Windows | Test forward DNS resolution for the domain"
      ansible.windows.win_shell: |
        try {
          $r = Resolve-DnsName -Name "LILLIAN.LOCAL" -ErrorAction Stop
          "RESOLVED: $($r[0].Name) -> $($r[0].IPAddress)"
        } catch {
          "DNS RESOLUTION FAILED: $_"
        }
      register: dns_forward
      changed_when: false

    - name: "Windows | Display forward DNS result"
      ansible.builtin.debug:
        msg: "Forward DNS on {{ inventory_hostname }}: {{ dns_forward.stdout | trim }}"
      when:
        - dns_forward is not skipped
        - dns_forward is not failed
        - dns_forward.stdout is defined

    # -------------------------------------------------------------------------
    # TASK 6.2 — Test reverse DNS (PTR) lookup for this host's own IP
    # Confirms PTR records are present in the reverse lookup zone
    # -------------------------------------------------------------------------
    - name: "Windows | Test reverse DNS (PTR) lookup for this host"
      ansible.windows.win_shell: |
        try {
          # Get the first non-loopback IPv4 address of this host
          $ip = (Get-NetIPAddress -AddressFamily IPv4 |
                 Where-Object { $_.InterfaceAlias -notlike '*Loopback*' } |
                 Select-Object -First 1).IPAddress
          $ptr = Resolve-DnsName -Name $ip -ErrorAction Stop
          "PTR: $ip -> $($ptr[0].NameHost)"
        } catch {
          "PTR LOOKUP FAILED for $ip : $_"
        }
      register: dns_ptr
      changed_when: false

    - name: "Windows | Display PTR lookup result"
      ansible.builtin.debug:
        msg: "Reverse DNS on {{ inventory_hostname }}: {{ dns_ptr.stdout | trim }}"
      when:
        - dns_ptr is not skipped
        - dns_ptr is not failed
        - dns_ptr.stdout is defined

    # -------------------------------------------------------------------------
    # TASK 6.3 — Warn if either DNS check indicates a failure
    # Gives a single consolidated warning line if something looks wrong
    # -------------------------------------------------------------------------
    - name: "Windows | Warn on DNS resolution failures"
      ansible.builtin.debug:
        msg: >
          WARNING: DNS issue detected on {{ inventory_hostname }}.
          Check that A and PTR records exist in both DNS zones on AD01.
      # Fire the warning if EITHER the forward or reverse lookup failed
      when:
        - dns_forward is not skipped
        - dns_forward is not failed
        - dns_forward.ptr is defined
        - dns_ptr is not skipped
        - dns_ptr is not failed
        - dns_ptr.stdout is defined
        - "'FAILED' in dns_forward.stdout or 'FAILED' in dns_ptr.stdout"

    # -------------------------------------------------------------------------
    # FINAL TASK — Summary completion message for the combined playbook
    # -------------------------------------------------------------------------
    - name: "=== Combined Playbook Complete on {{ inventory_hostname }} ==="
      ansible.builtin.debug:
        msg:
          - "All 6 elements have been processed for {{ inventory_hostname }}."
          - "  [1] Disk Inventory         — Rocky (ansible_mounts facts)"
          - "  [2] Password Policy        — AD01 (Set-ADDefaultDomainPasswordPolicy)"
          - "  [3] Guest Account Disabled — All Windows (win_user)"
          - "  [4] Firewalld Baseline     — Rocky (firewalld + SSH only)"
          - "  [5] Control Panel Restrict — All Windows (HKLM NoControlPanel)"
          - "  [6] DNS Record Verify      — All Windows (Resolve-DnsName A + PTR)"
